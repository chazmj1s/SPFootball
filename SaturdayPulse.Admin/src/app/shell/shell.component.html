<mat-sidenav-container class="sidenav-container">

  <mat-sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <img src="assets/appicon.png" class="app-logo" />
      <span class="app-title">Saturday Pulse</span>
      <span class="app-subtitle">Admin Console</span>
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a mat-list-item
           [routerLink]="item.route"
           routerLinkActive="active-link"
           [routerLinkActiveOptions]="{ exact: false }">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <mat-toolbar class="top-toolbar">
      <span class="toolbar-title">Saturday Pulse Admin</span>
      <span class="spacer"></span>
      <span class="env-badge">LOCAL</span>
    </mat-toolbar>

    <div class="page-content">
      <router-outlet />
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
