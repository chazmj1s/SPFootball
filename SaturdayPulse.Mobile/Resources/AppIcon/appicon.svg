<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#120a2c"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8f4cff"/>
      <stop offset="100%" stop-color="#d0a0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="36" y="36" width="952" height="952" rx="120"
        fill="url(#bg)" stroke="#47346e" stroke-width="4"/>

  <!-- SP Mark -->
  <text x="190" y="560"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="380"
        fill="#f7f7fb">S</text>

  <text x="505" y="740"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="380"
        fill="url(#purple)">P</text>

  <!-- Football separator -->
  <ellipse cx="555" cy="540" rx="46" ry="104"
           fill="none" stroke="url(#purple)" stroke-width="10"/>
  <line x1="555" y1="460" x2="555" y2="620"
        stroke="#ffffff" stroke-width="8"/>
  <line x1="532" y1="490" x2="578" y2="490"
        stroke="#ffffff" stroke-width="8"/>
  <line x1="532" y1="530" x2="578" y2="530"
        stroke="#ffffff" stroke-width="8"/>
  <line x1="532" y1="570" x2="578" y2="570"
        stroke="#ffffff" stroke-width="8"/>

  <!-- Pulse line -->
  <polyline points="90,650 235,650 275,585 315,770 385,605 440,650 690,650 930,650"
            fill="none" stroke="#9f63ff" stroke-width="10" filter="url(#glow)"/>

  <!-- FOOTBALL wordmark -->
  <line x1="95" y1="845" x2="210" y2="845" stroke="#8f4cff" stroke-width="4"/>
  <line x1="814" y1="845" x2="929" y2="845" stroke="#8f4cff" stroke-width="4"/>

  <text x="512" y="885"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-style="italic"
        font-weight="700"
        font-size="92"
        letter-spacing="8"
        fill="#f7f7fb">FOOTBALL</text>
</svg>
